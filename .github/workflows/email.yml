name: Fed Monitor — Email Report

on:
  push:
    branches: [main]
    paths:
      - 'data/reports/daily/**.txt'   # Fires only when CCR commits a new daily report
  workflow_dispatch:                   # Allow manual trigger from GitHub Actions UI

jobs:
  email:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Send daily report via SMTP
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python3 - <<'EOF'
          import smtplib, os, glob, sys
          from datetime import datetime, timedelta
          from zoneinfo import ZoneInfo
          from email.mime.text import MIMEText

          # Daily report is dated for the PRIOR day (ET) — matches the scoring
          # routine's REPORT_DATE, since scoring runs 6:30am ET reporting on yesterday.
          et_yesterday = datetime.now(ZoneInfo('America/New_York')) - timedelta(days=1)
          report_date = et_yesterday.strftime('%Y%m%d')
          reports = sorted(glob.glob(f'data/reports/daily/{report_date}*.txt'))

          if not reports:
              print(f"No daily report found for {report_date} — skipping email.")
              sys.exit(0)

          body = '\n\n'.join(open(r, encoding='utf-8').read() for r in reports)
          date_str = et_yesterday.strftime('%B %d, %Y')
          subject = f'Fed Monitor — Daily Update {date_str}'

          msg = MIMEText(body, 'plain', 'utf-8')
          msg['Subject'] = subject
          msg['From']    = 'revilresearch@gmail.com'
          msg['To']      = 'thiago_teixeiraferreira@vanguard.com'

          password = os.environ['GMAIL_APP_PASSWORD'].replace(' ', '')
          with smtplib.SMTP_SSL('smtp.gmail.com', 465) as server:
              server.login('revilresearch@gmail.com', password)
              server.send_message(msg)

          print(f'Sent: {subject}')
          EOF
