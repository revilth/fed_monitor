name: Fed Monitor — Email Report

on:
  push:
    branches: [main]
    paths:
      - 'data/reports/daily/**.txt'   # Fires when a daily report is committed
  workflow_dispatch:                   # Manual trigger from the Actions UI
    inputs:
      report_date:
        description: 'Single report date YYYYMMDD to (re)send. Blank = ET-yesterday.'
        required: false
        default: ''
      start_date:
        description: 'Range start YYYYMMDD (inclusive). With end_date, sends one consolidated email.'
        required: false
        default: ''
      end_date:
        description: 'Range end YYYYMMDD (inclusive).'
        required: false
        default: ''

jobs:
  email:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need history to diff the pushed commit range

      - name: Send daily report(s) via SMTP
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
          IN_REPORT_DATE: ${{ github.event.inputs.report_date }}
          IN_START_DATE: ${{ github.event.inputs.start_date }}
          IN_END_DATE: ${{ github.event.inputs.end_date }}
        run: |
          python3 - <<'EOF'
          import smtplib, os, glob, sys, subprocess, re
          from datetime import datetime, timedelta
          from zoneinfo import ZoneInfo
          from email.mime.text import MIMEText

          DAILY_DIR = 'data/reports/daily'

          def reports_for_dates(dates):
              out = []
              for d in dates:
                  out += sorted(glob.glob(f'{DAILY_DIR}/{d}*.txt'))
              # de-dup preserving order
              seen, uniq = set(), []
              for r in out:
                  if r not in seen:
                      seen.add(r); uniq.append(r)
              return uniq

          def dates_in_range(start, end):
              s = datetime.strptime(start, '%Y%m%d')
              e = datetime.strptime(end, '%Y%m%d')
              days = []
              while s <= e:
                  days.append(s.strftime('%Y%m%d')); s += timedelta(days=1)
              return days

          event = os.environ.get('EVENT_NAME', '')
          reports = []

          if event == 'workflow_dispatch':
              rd = os.environ.get('IN_REPORT_DATE', '').strip()
              sd = os.environ.get('IN_START_DATE', '').strip()
              ed = os.environ.get('IN_END_DATE', '').strip()
              if sd and ed:
                  reports = reports_for_dates(dates_in_range(sd, ed))
              elif rd:
                  reports = reports_for_dates([rd])
              else:
                  et_y = datetime.now(ZoneInfo('America/New_York')) - timedelta(days=1)
                  reports = reports_for_dates([et_y.strftime('%Y%m%d')])
          else:
              # push: email exactly the daily reports changed in this push range.
              before = os.environ.get('BEFORE_SHA', '')
              after  = os.environ.get('AFTER_SHA', '')
              changed = []
              if before and not re.fullmatch('0+', before):
                  try:
                      diff = subprocess.run(
                          ['git', 'diff', '--name-only', '--diff-filter=d', before, after],
                          capture_output=True, text=True, check=True).stdout
                      changed = [l for l in diff.splitlines()
                                 if l.startswith(DAILY_DIR + '/') and l.endswith('.txt')]
                  except subprocess.CalledProcessError:
                      changed = []
              if changed:
                  reports = sorted(set(changed))
              else:
                  # fallback: ET-yesterday (e.g. first push / shallow history)
                  et_y = datetime.now(ZoneInfo('America/New_York')) - timedelta(days=1)
                  reports = reports_for_dates([et_y.strftime('%Y%m%d')])

          if not reports:
              print("No matching daily report(s) — skipping email.")
              sys.exit(0)

          def date_label(path):
              m = re.search(r'(\d{8})', os.path.basename(path))
              if not m:
                  return os.path.basename(path)
              return datetime.strptime(m.group(1), '%Y%m%d').strftime('%B %d, %Y')

          body = '\n\n\n'.join(open(r, encoding='utf-8').read() for r in reports)
          if len(reports) == 1:
              subject = f'Fed Monitor — Daily Update {date_label(reports[0])}'
          else:
              subject = (f'Fed Monitor — Catch-up Update '
                         f'{date_label(reports[0])} – {date_label(reports[-1])} '
                         f'({len(reports)} reports)')

          msg = MIMEText(body, 'plain', 'utf-8')
          msg['Subject'] = subject
          msg['From']    = 'revilresearch@gmail.com'
          msg['To']      = 'thiago_teixeiraferreira@vanguard.com'

          password = os.environ['GMAIL_APP_PASSWORD'].replace(' ', '')
          with smtplib.SMTP_SSL('smtp.gmail.com', 465) as server:
              server.login('revilresearch@gmail.com', password)
              server.send_message(msg)

          print(f'Sent: {subject}')
          for r in reports:
              print(f'  - {r}')
          EOF
