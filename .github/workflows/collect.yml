name: Fed Monitor — Collect

on:
  schedule:
    - cron: '30 9 * * *'   # 5:30am ET (EDT) — runs before the 6:30am scoring routine so it captures the full prior day. Change to '30 10 * * *' after Nov 1 (EST).
  workflow_dispatch:         # Allow manual trigger from GitHub UI

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check FOMC blackout and collect
        run: |
          python3 - <<'EOF'
          from datetime import date
          import json, subprocess, sys

          # Blackout periods: single source of truth (official Fed calendar).
          today = date.today().isoformat()
          with open("blackout_periods.json") as f:
              periods = json.load(f)["periods"]
          if any(p["start"] <= today <= p["end"] for p in periods):
              print(f"BLACKOUT DAY ({today}) — skipping collection.")
              sys.exit(0)

          print(f"Not a blackout day ({today}) — collecting...")
          sys.exit(subprocess.run(["pip", "install", "-r", "requirements.txt", "-q"]).returncode
                   or subprocess.run(["python3", "main.py", "collect"]).returncode)
          EOF

      - name: Commit new raw files
        run: |
          git config user.email "fedmonitor@noreply.github.com"
          git config user.name "Fed Monitor — Collect"
          git add data/raw/
          git diff --staged --quiet && echo "Nothing new to commit." || \
            git commit -m "Collect $(date -u '+%Y-%m-%d'): new raw files" && git push
